server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    resolver 127.0.0.11 valid=5s;

    location = /favicon.ico {
        set $upstream_hermes_favicon http://hermes:9119;
        proxy_pass $upstream_hermes_favicon;
    }

    # ── Hermes API (for WebSocket and direct API access) ────────
    location /api/ {
        set $upstream_hermes_api http://hermes:9119;
        proxy_pass $upstream_hermes_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Hermes dashboard ──────────────────────────
    location /hermes/ {
        set $upstream_hermes http://hermes:9119;
        rewrite ^/hermes(/.*)$ $1 break;
        proxy_pass $upstream_hermes;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /hermes;
    }

    # ── Kokoro TTS (web UI + API) ────────────────
    location /kokoro/ {
        set $upstream_kokoro http://kokoro:8880;
        rewrite ^/kokoro(/.*)$ $1 break;
        proxy_pass $upstream_kokoro;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Ollama API ──────────────────────────────
    location /ollama/ {
        set $upstream_ollama http://ollama:11434;
        rewrite ^/ollama(/.*)$ $1 break;
        proxy_pass $upstream_ollama;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
