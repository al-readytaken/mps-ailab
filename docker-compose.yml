services:
# -- KOKORO -------------------------------------------------------------------
  kokoro:
    container_name: kokoro
    build:
      context: .
      dockerfile: ${KOKORO_DIR}/Dockerfile
    user: root
    ports:
      - "${KOKORO_PORT}:8880"
      - "${KOKORO_PORT_SSH}:22"
    volumes:
      - ${PROJECTS_DIR}:/opt/projects
      - ${COMMON_DIR}/ssh/sshd_config:/etc/ssh/sshd_config:ro
      - ${COMMON_DIR}/ssh/authorized_keys:/tmp/authorized_keys:ro
      - ${KOKORO_DIR}/scripts/entrypoint.bash:/entrypoint.bash:ro
    env_file: ${KOKORO_DIR}/.env
    entrypoint: ["/entrypoint.bash"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
# -- OLLAMA -------------------------------------------------------------------
  ollama:
    container_name: ollama
    build:
      context: .
      dockerfile: ${OLLAMA_DIR}/Dockerfile
    ports:
      - "${OLLAMA_PORT}:11434"
      - "${OLLAMA_PORT_SSH}:22"
    volumes:
      - ${MOUNTS_DIR}/ollama/.ollama:/root/.ollama
      - ${OLLAMA_DIR}/scripts/entrypoint.bash:/entrypoint.bash:ro
      - ${OLLAMA_DIR}/models.txt:/models.txt:ro
      - ${PROJECTS_DIR}:/opt/projects
      - ${COMMON_DIR}/ssh/sshd_config:/etc/ssh/sshd_config:ro
      - ${COMMON_DIR}/ssh/authorized_keys:/tmp/authorized_keys:ro
    devices:
      - /dev/kfd
      - /dev/dri
    env_file: ${OLLAMA_DIR}/.env
    entrypoint: ["/entrypoint.bash"]
    group_add:
      - "44"
      - "992"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 3
# -- OPENCODE -------------------------------------------------------------------
  opencode:
    container_name: opencode
    build:
      context: .
      dockerfile: ${OPENCODE_DIR}/Dockerfile
    ports:
      - "${OPENCODE_PORT_SSH}:22"
      - "${OPENCODE_PORT_WEB}:4096"
    volumes:
      - ${MOUNTS_DIR}/opencode/opencode:/root/.config/opencode
      - ${MOUNTS_DIR}/opencode/.opencode:/root/.opencode
      - ${PROJECTS_DIR}:/opt/projects
      - ${COMMON_DIR}/ssh/sshd_config:/etc/ssh/sshd_config:ro
      - ${COMMON_DIR}/ssh/authorized_keys:/tmp/authorized_keys:ro
      - ${OPENCODE_DIR}/scripts/entrypoint.bash:/entrypoint.bash:ro
    entrypoint: ["/entrypoint.bash"]
    env_file: ${OPENCODE_DIR}/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4096/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
# -- OPEN-WEBUI -------------------------------------------------------------------
  openwebui:
    container_name: openwebui
    build:
      context: .
      dockerfile: ${OPENWEBUI_DIR}/Dockerfile
    ports:
      - "${OPENWEBUI_PORT}:8080"
      - "${OPENWEBUI_PORT_SSH}:22"
    volumes:
      - ${MOUNTS_DIR}/openwebui/data:/app/backend/data
      - ${OPENWEBUI_DIR}/scripts/entrypoint.bash:/entrypoint.bash:ro
      - ${PROJECTS_DIR}:/opt/projects
      - ${COMMON_DIR}/ssh/sshd_config:/etc/ssh/sshd_config:ro
      - ${COMMON_DIR}/ssh/authorized_keys:/tmp/authorized_keys:ro
    env_file: ${OPENWEBUI_DIR}/.env
    entrypoint: ["/entrypoint.bash"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
# -- HERMES -------------------------------------------------------------------
  hermes:
    container_name: hermes
    build:
      context: .
      dockerfile: ${HERMES_DIR}/Dockerfile
    ports:
      - "${HERMES_PORT_SSH}:22"
      - "${HERMES_PORT_WEB}:9119"
    volumes:
      - ${MOUNTS_DIR}/hermes/.hermes:/root/.hermes
      - ${PROJECTS_DIR}:/opt/projects
      - ${COMMON_DIR}/ssh/sshd_config:/etc/ssh/sshd_config:ro
      - ${COMMON_DIR}/ssh/authorized_keys:/tmp/authorized_keys:ro
      - ${HERMES_DIR}/scripts/entrypoint.bash:/entrypoint.bash:ro
    entrypoint: ["/entrypoint.bash"]
    env_file: ${HERMES_DIR}/.env
    environment:
      - HERMES_HOSTNAME_WEB=${HERMES_HOSTNAME_WEB}
      - HERMES_PORT_WEB=${HERMES_PORT_WEB}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9119/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
