services:
  # ── Hermes AI agent ──────────────────────────────────────────
  hermes:
    build: ./hermes
    container_name: hermes
    restart: unless-stopped
    command: gateway run

    ports:
      - "8642:8642"   # gateway API
      - "9119:9119"   # dashboard
      - "8888:22"     # SSH access

    env_file:
      - ./hermes/.env

    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
      - HERMES_HOME=/home/hermes/.hermes
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0

    volumes:
      - ./hermes/config:/home/hermes/.hermes
      - ./projects:/opt/projects
      - ./hermes/.env:/opt/hermes/.env:ro

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8642/v1/chat/completions -o /dev/null -w '%{http_code}' || true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - backend

  # ── Opencode CLI ──────────────────────────────────────────────
  opencode:
    build: ./opencode
    container_name: opencode
    restart: unless-stopped
    command: sleep infinity

    ports:
      - "9999:22"     # SSH access

    env_file:
      - ./opencode/.env

    volumes:
      - ./projects:/opt/projects

    networks:
      - backend

  # ── Ollama LLM server (AMD GPU via ROCm) ─────────────────────
  ollama:
    build: ./ollama
    container_name: ollama
    restart: unless-stopped

    environment:
      - OLLAMA_MODELS_FILE=/opt/ollama-models.txt

    ports:
      - "11434:11434"

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - video

    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/ollama-models.txt:/opt/ollama-models.txt:ro

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - backend

  # ── Kokoro TTS engine ───────────────────────────────────────
  kokoro:
    build: ./kokoro
    container_name: kokoro
    restart: unless-stopped

    ports:
      - "8880:8880"

    volumes:
      - kokoro_data:/kokoro/voices

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8880/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - backend

  # ── LM Studio (AMD GPU via Vulkan) ──────────────────────────
  lmstudio:
    build: ./lmstudio
    container_name: lmstudio
    restart: unless-stopped

    ports:
      - "1234:1234"

    environment:
      - LMSTUDIO_MODEL=llama-3.2-1b-instruct
      - LMSTUDIO_PRELOAD=false

    volumes:
      - lmstudio_data:/root/.cache/lm-studio
      - /dev/dri:/dev/dri:ro

    group_add:
      - video

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1234/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - backend

volumes:
  ollama_data:
  kokoro_data:
  lmstudio_data:

networks:
  backend:
    driver: bridge
