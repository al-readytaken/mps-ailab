services:
  # ── Hermes AI agent ──────────────────────────────────────────
  hermes:
    build: ./hermes
    container_name: hermes
    restart: unless-stopped
    command: gateway run

    ports:
      - "8642:8642"   # gateway API

    env_file:
      - ./hermes/.env

    volumes:
      - hermes_data:/opt/data

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

    networks:
      - backend

  # ── Ollama LLM server ───────────────────────────────────────
  ollama:
    build: ./ollama
    container_name: ollama
    restart: unless-stopped

    environment:
      - OLLAMA_MODELS_FILE=/opt/ollama-models.txt

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/ollama-models.txt:/opt/ollama-models.txt:ro

    networks:
      - backend

  # ── Kokoro TTS engine ───────────────────────────────────────
  kokoro:
    build: ./kokoro
    container_name: kokoro
    restart: unless-stopped

    ports:
      - "8880:8880"

    volumes:
      - kokoro_data:/kokoro/voices

    networks:
      - backend

  # ── Nginx reverse proxy (TLS termination) ───────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped

    ports:
      - "443:443"

    volumes:
      - ./nginx/dashboard.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

    depends_on:
      - hermes

    networks:
      - frontend
      - backend

volumes:
  hermes_data:
  ollama_data:
  kokoro_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
