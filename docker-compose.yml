services:
  # ── Hermes AI agent ──────────────────────────────────────────
  hermes:
    build: ./hermes
    container_name: hermes
    restart: unless-stopped
    command: gateway run

    ports:
      - "8642:8642"   # gateway API
      - "9119:9119"   # dashboard
      - "8888:22"     # SSH access

    env_file:
      - ./hermes/.env

    volumes:
      - hermes_data:/opt/data
      - ./projects:/opt/projects

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

    networks:
      - backend

  # ── Opencode CLI ──────────────────────────────────────────────
  opencode:
    build: ./opencode
    container_name: opencode
    restart: unless-stopped
    command: sleep infinity

    ports:
      - "9999:22"     # SSH access

    env_file:
      - ./opencode/.env

    volumes:
      - ./projects:/opt/projects

    networks:
      - backend

  # ── Ollama LLM server (AMD GPU via ROCm) ─────────────────────
  ollama:
    build: ./ollama
    container_name: ollama
    restart: unless-stopped

    environment:
      - OLLAMA_MODELS_FILE=/opt/ollama-models.txt

    ports:
      - "11434:11434"

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - video

    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/ollama-models.txt:/opt/ollama-models.txt:ro

    networks:
      - backend

  # ── Kokoro TTS engine ───────────────────────────────────────
  kokoro:
    build: ./kokoro
    container_name: kokoro
    restart: unless-stopped

    ports:
      - "8880:8880"

    volumes:
      - kokoro_data:/kokoro/voices

    networks:
      - backend

  # ── LM Studio (AMD GPU via Vulkan) ──────────────────────────
  lmstudio:
    build: ./lmstudio
    container_name: lmstudio
    restart: unless-stopped

    ports:
      - "1234:1234"

    environment:
      - LMSTUDIO_MODEL=llama-3.2-1b-instruct
      - LMSTUDIO_PRELOAD=false

    volumes:
      - lmstudio_data:/root/.cache/lm-studio
      - /dev/dri:/dev/dri:ro

    group_add:
      - video

    networks:
      - backend

volumes:
  hermes_data:
  ollama_data:
  kokoro_data:
  lmstudio_data:

networks:
  backend:
    driver: bridge
